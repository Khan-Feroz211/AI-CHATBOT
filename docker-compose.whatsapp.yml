services:
  whatsapp-bot:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    env_file:
      - .env
    environment:
      - PORT=5000
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:5000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

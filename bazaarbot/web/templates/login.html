{% extends "base.html" %}
{% block title %}Login — BazaarBot{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🛒<br><h2>BazaarBot Admin</h2></div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Admin Password</label>
        <input type="password" name="password" placeholder="Password enter karein"
               required autofocus autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
    <p class="auth-note">Password <code>ADMIN_PASSWORD</code> environment variable se set karein.</p>
    <a href="{{ url_for('index') }}" class="back-link"><i class="fas fa-arrow-left"></i> Wapas</a>
  </div>
</div>
{% endblock %}

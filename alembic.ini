# Alembic configuration for BazaarBot
# DATABASE URL is set dynamically in alembic/env.py — do not set it here.

[alembic]
script_location = alembic
prepend_sys_path = .

# Timestamped revision filenames: 20241201_abc123_add_column.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone used when generating file_template timestamps
timezone = UTC

# Allow autogenerate to detect type changes
compare_type = true

# Truncate long messages in alembic output
truncate_slug_length = 40

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[pytest]
# Pytest configuration

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options
[coverage:run]
source = src
omit = 
    */tests/*
    */migrations/*
    */__main__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abstractproperty

[coverage:html]
directory = htmlcov

# Markers
markers =
    unit: Unit tests (single component)
    integration: Integration tests (multiple components)
    slow: Slow running tests
    database: Tests involving database
    whatsapp: WhatsApp integration tests
    auth: Authentication/authorization tests

name: tests

on:
  push:
  pull_request:

jobs:
  whatsapp-bot-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps (minimal)
        run: |
          python -m pip install --upgrade pip
          pip install flask requests redis pytest
      - name: Run tests
        run: pytest tests/test_whatsapp_bot.py
